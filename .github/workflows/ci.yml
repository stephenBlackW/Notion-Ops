# CI workflow draft for the future stephenBlackW/notion-ops public repo.
# Drop into .github/workflows/ci.yml in the new repo at Session 1 Step 4.
#
# Closes PUB-11 (CI/CD: test matrix + ruff + mypy + build + OIDC trusted PyPI publishing).
# Authored 2026-05-27 in Session 1 prep; lives here until carve-out, then moves out.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (mocked only; e2e skipped without NOTION_API_KEY)
        run: pytest -v --tb=short -m "not e2e"

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check notion_ops tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    continue-on-error: true   # TODO: drop after ao-cycle-1 closes PUB-07 (47 union-narrowing errors in operations/{blocks,data_sources}.py + client.py:204 known)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e ".[dev]"
      # NOTE: not --strict yet; PUB-07 strict cleanup deferred to ao-cycle-1.
      # Job is continue-on-error until those known errors are resolved.
      - run: mypy notion_ops

  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    needs: [test, lint]   # build only blocks on test + lint; typecheck is advisory until PUB-07
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify LICENSE in wheel
        run: |
          python -c "
          import zipfile, glob
          (whl,) = glob.glob('dist/*.whl')
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              assert any(n.endswith('/LICENSE') for n in names), f'LICENSE missing from wheel: {names}'
              print('LICENSE present in', whl)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # TODO: before first release, confirm PyPI project `notion-ops` exists
      # and the OIDC trusted publisher is configured at pypi.org/manage/project/notion-ops/settings/publishing/.
      # See https://docs.pypi.org/trusted-publishers/
      - uses: pypa/gh-action-pypi-publish@release/v1
