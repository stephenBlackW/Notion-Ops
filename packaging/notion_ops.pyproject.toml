# DRAFT standalone pyproject for the future public `notion-ops` repo (PUB-03).
# This is NOT the monorepo build config — it is staged here for the carve-out
# (it becomes the public repo's root pyproject.toml). The monorepo root
# pyproject.toml (name="agentic-os") still governs the AOS build.
#
# Validated by tests/test_iss_refactor_b.py::test_standalone_pyproject_draft_valid.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notion-ops"
version = "0.1.0"
description = "A high-level, typed, retry-aware Python client for Notion workspaces."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Stephen Black" }]
keywords = ["notion", "notion-api", "client", "pydantic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "notion-client>=2.3.0",
    "pydantic>=2.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://github.com/stephenblackw/notion-ops"
Repository = "https://github.com/stephenblackw/notion-ops"
Issues = "https://github.com/stephenblackw/notion-ops/issues"

[tool.hatch.build.targets.wheel]
packages = ["notion_ops"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "e2e: end-to-end tests requiring a live Notion workspace (NOTION_API_KEY)",
]
